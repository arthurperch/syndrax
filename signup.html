<!DOCTYPE html>
<html lang="en" class="dark">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Create Account — Syndrax Sync</title>
  <meta name="description" content="Start your free Syndrax Sync account and automate your e-commerce operations.">
  <link rel="icon" type="image/png" href="assets/images/synball.png">
  <link rel="stylesheet" href="style.css?v=26">
  <script>if(localStorage.getItem("theme")==="light"){document.documentElement.classList.remove("dark");}</script>
</head>
<body class="auth-page">
<div class="auth-grid-bg"></div>

<div class="auth-card">
  <div class="auth-logo">
    <a href="/"><img src="assets/TOPLOGO/BANNEREFFECT.png" alt="Syndrax"></a>
  </div>

  <h1 class="auth-title">Create your account</h1>
  <p class="auth-sub">Join Syndrax and automate your entire e-commerce operation</p>

  <div class="auth-alert" id="authAlert"></div>

  <!-- Google -->
  <button class="auth-google" id="googleBtn" type="button">
    <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
      <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
      <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
      <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/>
      <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
    </svg>
    Continue with Google
  </button>

  <div class="auth-divider"><span>or sign up with email</span></div>

  <form class="auth-form" id="signupForm" novalidate>
    <div class="auth-field">
      <label for="fullName">Full name</label>
      <input type="text" id="fullName" name="fullName" placeholder="Jane Smith" autocomplete="name" required>
    </div>
    <div class="auth-field">
      <label for="email">Work email</label>
      <input type="email" id="email" name="email" placeholder="you@company.com" autocomplete="email" required>
    </div>
    <div class="auth-field">
      <label for="password">Password</label>
      <div class="auth-field-wrap">
        <input type="password" id="password" name="password" placeholder="At least 12 characters" autocomplete="new-password" required>
        <button type="button" class="auth-pw-toggle" id="pwToggle" aria-label="Toggle password visibility">
          <svg class="eye-show" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
          <svg class="eye-hide" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="display:none"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94"/><path d="M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19"/><line x1="1" y1="1" x2="23" y2="23"/></svg>
        </button>
      </div>
    </div>
    <button type="submit" class="auth-submit" id="signupBtn">
      Create Account
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>
    </button>
  </form>

  <p class="auth-terms">By creating an account you agree to our <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a>.</p>
  <p class="auth-switch">Already have an account? <a href="/login">Sign in</a></p>
</div>

<script type="module">
  import { signUp, confirmSignUp, googleRedirect, getSession, MIN_PASSWORD }
    from '/auth-cognito.js';

  if (getSession()) window.location.replace('/app');

  const alertEl = document.getElementById('authAlert');
  const signupBtn = document.getElementById('signupBtn');

  function showAlert(msg, type = 'error') {
    alertEl.textContent = msg;
    alertEl.className = 'auth-alert ' + type;
  }
  function clearAlert() {
    alertEl.className = 'auth-alert';
    alertEl.textContent = '';
  }
  function setLoading(loading) {
    signupBtn.disabled = loading;
    signupBtn.innerHTML = loading
      ? '<svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><path d="M12 2v4M12 18v4M4.93 4.93l2.83 2.83M16.24 16.24l2.83 2.83M2 12h4M18 12h4M4.93 19.07l2.83-2.83M16.24 7.76l2.83-2.83"/></svg> Creating account…'
      : 'Create Account <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><path d="M5 12h14M12 5l7 7-7 7"/></svg>';
  }

  // Email signup (Cognito). Sends a confirmation code, then reveals the code step.
  document.getElementById('signupForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    clearAlert();
    const fullName = document.getElementById('fullName').value.trim();
    const email = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    if (!fullName || !email || !password) { showAlert('Please fill in all fields.'); return; }
    if (password.length < MIN_PASSWORD) { showAlert('Password must be at least ' + MIN_PASSWORD + ' characters.'); return; }
    setLoading(true);
    try {
      await signUp(email, password, fullName);
      revealConfirmStep(email);
      showAlert('We sent a confirmation code to your email. Enter it below to finish.', 'success');
    } catch (err) {
      showAlert(err.message);
    } finally {
      setLoading(false);
    }
  });

  // Google (Cognito hosted UI redirect)
  document.getElementById('googleBtn').addEventListener('click', () => googleRedirect('/'));

  function revealConfirmStep(email) {
    if (document.getElementById('confirmStep')) return;
    const form = document.getElementById('signupForm');
    form.style.display = 'none';
    const div = document.createElement('div');
    div.id = 'confirmStep';
    div.innerHTML =
      '<div class="auth-field"><label for="confirmCode">Confirmation code</label>' +
      '<input id="confirmCode" inputmode="numeric" autocomplete="one-time-code" placeholder="Code from your email"></div>' +
      '<button type="button" id="confirmBtn" class="auth-submit">Confirm account</button>';
    form.after(div);
    document.getElementById('confirmBtn').addEventListener('click', async () => {
      const code = document.getElementById('confirmCode').value.trim();
      if (!code) { showAlert('Enter the confirmation code from your email.'); return; }
      try {
        await confirmSignUp(email, code);
        showAlert('Account confirmed! Redirecting to sign in…', 'success');
        setTimeout(() => { window.location.href = '/login'; }, 1500);
      } catch (err) {
        showAlert(err.message);
      }
    });
  }

  // Password toggle
  const pwToggle = document.getElementById('pwToggle');
  const pwInput = document.getElementById('password');
  pwToggle.addEventListener('click', () => {
    const visible = pwInput.type === 'text';
    pwInput.type = visible ? 'password' : 'text';
    pwToggle.querySelector('.eye-show').style.display = visible ? '' : 'none';
    pwToggle.querySelector('.eye-hide').style.display = visible ? 'none' : '';
  });
</script>
</body>
</html>
